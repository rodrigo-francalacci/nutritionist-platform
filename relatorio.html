<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Relatório</title>

<style type="text/css">
    table {
        border-top-style: dashed;
        border-width: thin;
        width: 100%;
    }
    
    table tr{
        width: 100%;
        border-style: none;
        border-width: thin;}
    
    table td{
        border-style: none;
        border-width: thin;}
    
    ul{
        list-style: none;
        margin: auto;
        padding: 3px;
    }
    
    li{margin: auto;
    
    }
    
</style><!-- estilo tabela-->

<style type="text/css">
    
    body{
        
        width: 210mm;
        min-height: 297mm;
        padding: 10mm;
        margin: 10mm auto;
        border: 1px #D3D3D3 solid;
        border-radius: 5px;
        background: white;
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        font-family: "Arial";
        font-size: 14px;
    }
    
    
    
</style>

<style type="text/css">
    /* a barra de acoes nao sai na impressao */
    @media print {
        .no-print { display: none; }
        body { border: none; box-shadow: none; margin: 0; }
    }
</style>

    </head>

<body>

<div class="no-print">
    <input type="button" value="Imprimir" onclick="window.print()"/>
</div>

<div id="print"></div>

<script>
//O relatorio e passado pela pagina principal via sessionStorage.
(function(){
    var conteudo = sessionStorage.getItem("relatorio");

    if (conteudo === null){
        document.getElementById("print").textContent =
            "Nenhum relatório encontrado. Volte à página principal e clique em Print.";
        return;
    }

    document.getElementById("print").innerHTML = conteudo;
})();
</script>

</body>
</html>
